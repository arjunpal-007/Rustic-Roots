<!DOCTYPE html>
<html>
<head>
  <title>Admin Products</title>
  <style>
   body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      min-height: 100vh;
      background-image:
        linear-gradient(rgba(255,255,255,0.55), rgba(255,255,255,0.35)),
        url("/static/assets/bg.jpeg");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .navbar{
  height:70px;
  background:#2e7d32;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 40px;
  color:white;
}

.navbar a{
  color:white;
  text-decoration:none;
  margin-left:20px;
}

    h2 { margin-bottom: 20px; }

    table {
      width: 100%;
      background: white;
      border-collapse: collapse;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    th, td {
      padding: 14px;
      border-bottom: 1px solid #eee;
      text-align: left;
    }

    th {
      background: #e8f5e9;
      color: #2e7d32;
    }

    button {
      padding: 6px 12px;
      border: none;
      cursor: pointer;
      border-radius: 6px;
      font-size: 14px;
    }

    .edit {
      background: #ffb300;
      color: white;
    }

    .delete {
      background: #e53935;
      color: white;
    }
  </style>
</head>
<body>

    <nav class="navbar">
  <div>📦 Rustic Roots Admin</div>
  <div>
    <a href="/static/admin/orders.html">Orders</a>
    <a href="/static/admin/add-product.html">Add Product</a>
    <a href="/static/admin/products.html">Products</a>
  </div>
</nav>  

<h2>🛒 All Products</h2>

<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Price</th>
      <th>Best Seller</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="productTable"></tbody>
</table>

<script>
fetch("/admin/products")
  .then(res => res.json())
  .then(products => {
    const table = document.getElementById("productTable");

    products.forEach(p => {
      table.innerHTML += `
        <tr>
          <td>${p.id}</td>
          <td>${p.name}</td>
          <td>₹${p.price}</td>
          <td>${p.is_best_seller ? "✅" : "❌"}</td>
          <td>
            <button class="edit" onclick="editProduct(${p.id}, '${p.name}', ${p.price}, '${p.description || ""}', ${p.is_best_seller})">Edit</button>
            <button class="delete" onclick="deleteProduct(${p.id})">Delete</button>
          </td>
        </tr>
      `;
    });
  });


function deleteProduct(id) {
  if (!confirm("Delete this product?")) return;

  fetch(`/admin/delete-product/${id}`, {
    method: "DELETE"
  })
  .then(res => res.json())
  .then(() => {
    alert("Deleted");
    location.reload();
  });
}


function editProduct(id, name, price, desc, best) {
  const newName = prompt("Product Name:", name);
  const newPrice = prompt("Price:", price);
  const newDesc = prompt("Description:", desc);
  const isBest = confirm("Mark as Best Seller?");

  fetch(`/admin/edit-product/${id}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      name: newName,
      price: newPrice,
      description: newDesc,
      is_best_seller: isBest
    })
  })
  .then(res => res.json())
  .then(() => {
    alert("Updated");
    location.reload();
  });
}

function logout() {
    localStorage.removeItem("admin");
    window.location.href = "/static/admin/login.html";
}

</script>

</body>
</html>
