<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout</title>

  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      background-image:
        linear-gradient(rgba(255,255,255,0.75), rgba(255,255,255,0.75)),
        url("/static/assets/bg.jpeg");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .navbar{
  height:70px;
  background:#2e7d32;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 40px;
  box-shadow:0 8px 20px rgba(0,0,0,.18);
  flex-wrap:wrap; /* ✅ responsive */
}

.nav-left img{ height:46px }

.nav-right{
  display:flex;
  gap:26px;
  flex-wrap:wrap; /* ✅ responsive */
}

.nav-right a{
  color:white;
  text-decoration:none;
  font-weight:500;
  position: relative;
  transition: all 0.3s ease;
}

.nav-right a::after {
  content: '';
  position: absolute;
  bottom: -5px;
  left: 0;
  width: 0;
  height: 2px;
  background: #a5d6a7;
  transition: width 0.3s ease;
}

.nav-right a:hover::after {
  width: 100%;
}

.login-btn{
  background:white;
  color:#2e7d32 !important;
  padding:8px 18px;
  border-radius:22px;
  font-weight:600;
}

    .card {
      max-width: 760px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.15);
    }

    .item {
      display: flex;
      gap: 15px;
      padding: 12px 0;
      border-bottom: 1px solid #eee;
    }

    .item img {
      width: 70px;
      height: 70px;
      object-fit: cover;
      border-radius: 10px;
    }

    .total {
      text-align: right;
      font-size: 20px;
      font-weight: bold;
      margin-top: 12px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg,#2f7a3e,#4caf50);
      color: white;
      border: none;
      font-size: 16px;
      font-weight: 600;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(47,122,62,.35);
      transition: .3s;
    }

    button:hover { transform: translateY(-2px); }

    #msg { margin-top: 10px; font-weight: bold; color: green; }

    /* ================= RESPONSIVE ADDITION ================= */

    @media (max-width: 768px) {

      .navbar {
        height: auto;
        padding: 15px;
        flex-direction: column;
      }

      .nav-right {
        margin-top: 10px;
        justify-content: center;
      }

      .nav-right a {
        margin: 8px 12px;
      }

      .card {
        margin: 25px 15px;
        padding: 20px;
      }

      .item {
        flex-direction: column;
        align-items: flex-start;
      }

      .item img {
        width: 100%;
        max-width: 220px;
        height: auto;
      }

      .total {
        text-align: left;
      }

      #upiBox img {
        width: 100%;
        max-width: 300px;
        height: auto;
      }
    }

  </style>
</head>

<body>

<nav class="navbar">
  <div class="nav-left">
    <a href="/static/customer/index.html" class="logo-link">
      <img src="/static/customer/logo.png">
    </a>
  </div>

  <div class="nav-right" id="navLinks">
    <a href="/static/customer/products.html">Products</a>
    <a href="/static/customer/videos.html">Videos</a>
    <a href="/static/customer/testimonials.html">Testimonials</a>
    <a href="/static/customer/cart.html">Cart</a>
    <a href="/static/customer/login.html">Login</a>
  </div>
</nav>

<div class="card">
  <h2>Checkout</h2>

  <h3>Your Order</h3>
  <div id="orderItems"></div>
  <div class="total" id="grandTotal"></div>

  <hr>

  <h3>Delivery Details</h3>
  <input id="name" placeholder="Full Name">
  <input id="phone" placeholder="Phone Number">
  <input type="email" id="email" placeholder="Email Address">
  <textarea id="address" placeholder="Delivery Address"></textarea>

  <h3>Select Payment Method</h3>

  <div style="margin:20px 0;">
    <input type="radio" name="payment" value="upi" id="upi">
    <label for="upi">Pay via UPI</label>
  </div>

  <div id="upiBox" style="display:none; margin-top:15px;">
    <p><b>Send payment to:</b> yourupi@okaxis</p>

    <img src="/static/uploads/upi-scanner.png" 

          alt="UPI QR Code" 
          style="width:200px; height:200px; border:1px solid #ccc; padding:10px; border-radius:10px;">

    <input type="text"
           id="upiRef"
           placeholder="Enter UPI Transaction ID">
  </div>

  <br><br>
  <button onclick="placeOrder()">Place Order</button>
  <p id="msg"></p>
</div>

<script>
const nav = document.getElementById("navLinks");
const user = JSON.parse(localStorage.getItem("user"));
const cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;
const container = document.getElementById("orderItems");

if (cart.length === 0) {
  container.innerHTML = "<p>Your cart is empty</p>";
} else {
  cart.forEach(p => {
    const qty = p.quantity || 1;
    const subtotal = p.price * qty;
    total += subtotal;

    container.innerHTML += `
      <div class="item">
        <img src="${p.image}">
        <div>
          <b>${p.name}</b><br>
          ₹${p.price} × ${qty}<br>
          <small>Subtotal: ₹${subtotal}</small>
        </div>
      </div>
    `;
  });

  document.getElementById("grandTotal").innerText = "Total: ₹" + total;
}

function validateUPI(ref) {
  return ref.length >= 8;
}

function placeOrder() {

  if (cart.length === 0) {
    alert("Cart is empty");
    return;
  }

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const address = document.getElementById("address").value;
  const email = document.getElementById("email").value;
  const paymentMethod = document.querySelector('input[name="payment"]:checked');

  if (!name || !phone || !address || !email) {
    alert("Please fill all delivery details");
    return;
  }

  if (!paymentMethod) {
    alert("Please select payment method");
    return;
  }

  const upiRef = document.getElementById("upiRef").value;

  if (!validateUPI(upiRef)) {
    alert("Invalid UPI Transaction ID");
    return;
  }

  const orderData = {
    name: name,
    phone: phone,
    address: address,
    email: email,
    items: cart,
    total: total,
    payment_method: "UPI",
    payment_ref: upiRef
  };

  fetch("/place-order", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(orderData)
  })
  .then(res => res.json())
  .then(data => {
    if (data.message) {
      localStorage.removeItem("cart");
      alert("Payment verified ✅ Order placed successfully 🎉");
      window.location.href = "/static/customer/index.html";
    } else {
      alert("Order failed");
    }
  })
  .catch(err => {
    console.error(err);
    alert("Something went wrong");
  });
}

document.getElementById("upi").addEventListener("change", function() {
  document.getElementById("upiBox").style.display = "block";
});


if (user && user.name) {
  nav.innerHTML = `
    <span style="color:white;margin-right:15px;">
      👋 Hi, <b>${user.name}</b>
    </span>
    <a href="/static/customer/products.html">Products</a>
    <a href="/static/customer/videos.html">Videos</a>
    <a href="/static/customer/testimonials.html">Testimonials</a>
    <a href="/static/customer/cart.html">Cart</a>
    <a href="#" onclick="logout()">Logout</a>
  `;
}

function logout() {
  localStorage.removeItem("user");
  alert("Logged out successfully");
  window.location.href = "/static/customer/login.html";
}

</script>

</body>
</html>
