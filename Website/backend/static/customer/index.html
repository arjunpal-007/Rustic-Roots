<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rustic Roots</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-image: 
        linear-gradient(rgba(255,255,255,.49), rgba(255,255,255,.25)),
        url("/static/assets/bg.jpeg");
      background-size: cover;
      background-attachment: fixed;
      min-height: 100vh;
    }

    /* NAVBAR */
    .navbar {
      height: 70px;
      background: #2e7d32;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 24px;
      flex-wrap: wrap;
    }

    .nav-right {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .nav-right a {
      color: white;
      text-decoration: none;
      margin-left: 22px;
      font-weight: 500;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 120px 20px;
      position: relative;
      overflow: hidden;
    }

    .hero-logo {
      height: 350px;
      width: auto;
      margin-bottom: 90px;
      opacity: 0;
      transform: scale(0.8);
      animation: fadeZoom 2.5s ease forwards;
    }

    .hero button {
      margin-top: 30px;
      padding: 14px 34px;
      background: #2e7d32;
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
    }

    /* ANIMATIONS */
    @keyframes fadeZoom {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* LEAVES */
    .leaves {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .leaves span {
      position: absolute;
      top: -10px;
      width: 25px;
      height: 18px;
      background: #2e7d32;
      border-radius: 50% 0;
      opacity: 0.6;
      animation: leafFall linear infinite;
    }

    .leaves span:nth-child(1) { left: 20%; animation-duration: 3s; }
    .leaves span:nth-child(2) { left: 40%; animation-duration: 5s; }
    .leaves span:nth-child(3) { left: 60%; animation-duration: 7s; }
    .leaves span:nth-child(4) { left: 80%; animation-duration: 9s; }
    .leaves span:nth-child(5) { left: 30%; animation-duration: 6s; }
    .leaves span:nth-child(6) { left: 50%; animation-duration: 8s; }
    .leaves span:nth-child(7) { left: 70%; animation-duration: 4s; }

    @keyframes leafFall {
      from {
        transform: translateY(0) rotate(0deg);
      }
      to {
        transform: translateY(110vh) rotate(360deg);
      }
    }

    /* CONTACT SECTION */
    .contact-wrapper {
      margin-top:60px;
      background:#1b5e20;
      color:white;
      padding:40px 20px;
    }

    .contact-container {
      max-width:1000px;
      margin:auto;
      display:flex;
      flex-wrap:wrap;
      gap:40px;
    }

    .contact-box {
      flex:1;
      min-width:250px;
    }

    .contact-form {
      flex:1;
      min-width:300px;
    }

    .contact-form input,
    .contact-form textarea {
      width:100%;
      padding:10px;
      margin-bottom:10px;
      border-radius:6px;
      border:none;
    }

    .contact-form button {
      margin-top:10px;
      width:100%;
      padding:12px;
      border:none;
      border-radius:20px;
      background:#4caf50;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    .footer {
      text-align:center;
      margin-top:30px;
    }

    /* ================= MOBILE RESPONSIVE ================= */
    @media (max-width: 768px) {

      .navbar {
        height: auto;
        padding: 15px;
        flex-direction: column;
        align-items: center;
      }

      .nav-right {
        margin-top: 10px;
      }

      .nav-right a {
        margin: 8px 12px;
      }

      .hero {
        padding: 80px 15px;
      }

      .hero-logo {
        height: 100px;
        margin-bottom: 40px;
      }

      .contact-container {
        flex-direction: column;
      }

    }

  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div></div>
  <div class="nav-right" id="navLinks">
    <a href="/static/customer/about.html">About</a>
    <a href="/static/customer/products.html">Products</a>
    <a href="/static/customer/cart.html">Cart</a>
    <a href="/static/customer/login.html">Login</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <img src="/static/customer/logo.png" class="hero-logo" alt="Rustic Roots">

  <br>
  <button onclick="window.location.href='/static/customer/products.html'">
    Shop Products
  </button>

  <div class="leaves">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>
</div>

<!-- CONTACT -->
<div class="contact-wrapper">
  <div class="contact-container">

    <div class="contact-box">
      <h3>Contact Us</h3>
      <p><b>Phone:</b> +91 9876543210</p>
      <p><b>Email:</b> support@rusticroots.in</p>
      <p><b>Address:</b> Bengaluru, India</p>
    </div>

    <div class="contact-form">
      <h3>Send Your Query</h3>

      <input id="qName" placeholder="Your Name">
      <input id="qEmail" placeholder="Your Email">
      <textarea id="qMessage" placeholder="Write your query!!!"></textarea>

      <button onclick="sendQuery()">Send Query</button>

      <p id="qMsg" style="margin-top:10px;"></p>
    </div>

  </div>

  <div class="footer">
    © 2026 Rustic Roots | Natural Skincare
  </div>
</div>

<script>
const nav = document.getElementById("navLinks");
const user = JSON.parse(localStorage.getItem("user"));

function sendQuery() {
  const name = document.getElementById("qName").value;
  const email = document.getElementById("qEmail").value;
  const message = document.getElementById("qMessage").value;

  if (!name || !email || !message) {
    document.getElementById("qMsg").innerText = "Please fill all fields.";
    return;
  }

  document.getElementById("qMsg").innerText = "Query sent successfully!";
  document.getElementById("qName").value = "";
  document.getElementById("qEmail").value = "";
  document.getElementById("qMessage").value = "";
}


if (user && user.name) {
  nav.innerHTML = `
    <span style="color:white;margin-right:15px;">
      👋 Hi, <b>${user.name}</b>
    </span>
    <a href="/static/customer/about.html">About</a>
    <a href="/static/customer/products.html">Products</a>
    <a href="/static/customer/cart.html">Cart</a>
    <a href="#" onclick="logout()">Logout</a>
  `;
}

function logout() {
  localStorage.removeItem("user");
  alert("Logged out successfully");
  window.location.href = "/static/customer/login.html";
}

</script>
</body>
</html>
