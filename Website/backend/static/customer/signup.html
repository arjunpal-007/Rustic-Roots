<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup</title>
<link rel="stylesheet" href="/static/customer/style.css">

<style>

/* ===== BODY ===== */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  min-height: 100vh;
  background:
    linear-gradient(rgba(255,255,255,.85), rgba(255,255,255,.85)),
    url("/static/assets/bg.jpeg");
  background-size: cover;
  background-position: center;
  display: flex;
  flex-direction: column;
}

/* ===== NAVBAR ===== */
.navbar {
  height: 70px;
  background: #2e7d32;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
}

.nav-right a {
  color: white;
  text-decoration: none;
  margin-left: 22px;
  font-weight: 500;
}

/* ===== CENTER ===== */
.container {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

/* ===== CARD (FORCED FIX) ===== */
.card {
  width: 100% !important;
  max-width: 620px !important;   /* 🔥 BIG SIZE */
  background: white !important;
  padding: 60px 50px !important;
  border-radius: 24px !important;
  box-shadow: 0 25px 50px rgba(0,0,0,.18) !important;
  text-align: center;
}

/* TITLE */
.card h2 {
  font-size: 30px !important;
  color: #2e7d32;
  margin-bottom: 30px;
}

/* INPUT GROUP */
.input-group {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* INPUT */
.card input {
  width: 100%;
  padding: 18px !important;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-size: 16px !important;
  transition: .3s;
  box-sizing: border-box;
}

.card input:focus {
  outline: none;
  border-color: #2e7d32;
  box-shadow: 0 0 0 3px rgba(46,125,50,.15);
}

/* BUTTON */
.card button {
  margin-top: 25px;
  width: 100%;
  padding: 18px !important;
  background: linear-gradient(135deg,#2f7a3e,#4caf50);
  color: white;
  border: none;
  font-size: 18px !important;
  font-weight: 600;
  border-radius: 35px;
  cursor: pointer;
  box-shadow: 0 10px 25px rgba(47,122,62,.35);
  transition: .3s;
}

.card button:hover {
  transform: translateY(-2px);
}

/* TEXT */
.card p {
  margin-top: 20px;
  font-size: 15px;
}

.card a {
  color: #2e7d32;
  font-weight: 600;
  text-decoration: none;
}

/* ===== MOBILE ===== */
@media (max-width: 600px) {

  .card {
    max-width: 92% !important;
    padding: 30px 20px !important;
  }

  .card h2 {
    font-size: 24px !important;
  }

}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div></div>
  <div class="nav-right" id="navLinks">
    <a href="/static/customer/products.html">Products</a>
    <a href="/static/customer/cart.html">Cart</a>
    <a href="/static/customer/login.html">Login</a>
  </div>
</nav>

<!-- SIGNUP -->
<div class="container">
  <div class="card">

    <h2>Signup</h2>

    <div class="input-group">
      <input id="name" placeholder="Full Name">
      <input id="email" placeholder="Email">
      <input id="password" type="password" placeholder="Password">
    </div>

    <button onclick="signup()">Create Account</button>

    <p>Already have account? <a href="login.html">Login</a></p>

  </div>
</div>

<!-- SCRIPT -->
<script src="/static/customer/auth.js"></script>

<script>
const nav = document.getElementById("navLinks");
const user = JSON.parse(localStorage.getItem("user"));

if (user && user.name) {
  nav.innerHTML = `
    <span style="color:white;margin-right:15px;">
      👋 Hi, <b>${user.name}</b>
    </span>
    <a href="/static/customer/products.html">Products</a>
    <a href="/static/customer/cart.html">Cart</a>
    <a href="#" onclick="logout()">Logout</a>
  `;
}

function logout() {
  localStorage.removeItem("user");
  alert("Logged out successfully");
  window.location.href = "/static/customer/login.html";
}
</script>

</body>
</html>
