<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Cart</title>

<link rel="stylesheet" href="/static/customer/style.css">

<style>
 body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-image: 
        linear-gradient(rgba(255,255,255,.49), rgba(255,255,255,.25)),
        url("/static/assets/bg.jpeg");
      background-size: cover;
      background-attachment: fixed;
      min-height: 100vh;
    }

/* ===== NAVBAR ===== */
.navbar{
  height:70px;
  background:#2e7d32;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 40px;
  box-shadow:0 8px 20px rgba(0,0,0,.18);
  flex-wrap:wrap; /* ✅ responsive */
}

.nav-left img{ height:46px }

.nav-right{
  display:flex;
  gap:26px;
  flex-wrap:wrap; /* ✅ responsive */
}

.nav-right a{
  color:white;
  text-decoration:none;
  font-weight:500;
  position: relative;
  transition: all 0.3s ease;
}

.nav-right a::after {
  content: '';
  position: absolute;
  bottom: -5px;
  left: 0;
  width: 0;
  height: 2px;
  background: #a5d6a7;
  transition: width 0.3s ease;
}

.nav-right a:hover::after {
  width: 100%;
}

.login-btn{
  background:white;
  color:#2e7d32 !important;
  padding:8px 18px;
  border-radius:22px;
  font-weight:600;
}

/* ===== CART BOX ===== */
.cart-box{
  max-width:900px;
  margin:40px auto;
  background:white;
  padding:30px;
  border-radius:22px;
  box-shadow:0 20px 40px rgba(0,0,0,.15);
}

.cart-box h2{
  text-align:center;
  margin-bottom:25px;
}

/* ===== CART ITEM ===== */
.cart-item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:20px;
  padding:15px 0;
  border-bottom:1px solid #eee;
}

.cart-item img{
  width:80px;
  border-radius:12px;
}

.cart-info{
  flex:1;
}

.cart-info h4{
  margin:0;
}

.price{
  color:#2e7d32;
  font-weight:600;
}

/* ===== QTY ===== */
.qty-box{
  display:flex;
  align-items:center;
  gap:12px;
}

.qty-box button{
  width:32px;
  height:32px;
  border-radius:50%;
  border:none;
  background:#2e7d32;
  color:white;
  font-size:18px;
  cursor:pointer;
}

/* REMOVE */
.remove{
  background:crimson;
  color:white;
  border:none;
  padding:6px 14px;
  border-radius:18px;
  cursor:pointer;
}

/* ===== FOOTER ===== */
.cart-footer{
  margin-top:30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.total{
  font-size:20px;
  font-weight:bold;
}

.checkout{
  background:#2e7d32;
  color:white;
  border:none;
  padding:14px 36px;
  border-radius:30px;
  font-size:16px;
  cursor:pointer;
}

/* ================= RESPONSIVE ADDITION ================= */

@media (max-width: 900px){

  .cart-box{
    margin:30px 20px;
    padding:25px;
  }

  .cart-item{
    flex-direction:column;
    align-items:flex-start;
    gap:15px;
  }

  .qty-box{
    margin-top:5px;
  }

}

@media (max-width: 768px){

  .navbar{
    height:auto;
    padding:15px;
    flex-direction:column;
  }

  .nav-right{
    justify-content:center;
    margin-top:10px;
  }

  .cart-footer{
    flex-direction:column;
    gap:20px;
  }

  .checkout{
    width:100%;
  }

}
</style>
</head>

<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar">
  <div class="nav-left">
    <a href="/static/customer/index.html" class="logo-link">
      <img src="/static/customer/logo.png">
    </a>
  </div>

  <div class="nav-right" id="navLinks">
    <a href="/static/customer/products.html">Products</a>
    <a href="/static/customer/videos.html">Videos</a>
    <a href="/static/customer/testimonials.html">Testimonials</a>
    <a href="/static/customer/cart.html">Cart</a>
    <a href="/static/customer/login.html">Login</a>
  </div>
</nav>

<!-- ===== CART ===== -->
<div class="cart-box">
  <h2>Your Cart</h2>
  <div id="cartItems"></div>

  <div class="cart-footer">
    <div class="total" id="total">Total: ₹0</div>
    <button class="checkout" onclick="checkout()">Proceed to Checkout</button>
  </div>
</div>

<script>

const nav = document.getElementById("navLinks");
const user = JSON.parse(localStorage.getItem("user"));

let cart = JSON.parse(localStorage.getItem("cart")) || [];
const cartBox = document.getElementById("cartItems");
const totalEl = document.getElementById("total");

function renderCart(){
  cartBox.innerHTML = "";
  let total = 0;

  if(cart.length === 0){
    cartBox.innerHTML = "<p style='text-align:center'>Your cart is empty</p>";
    totalEl.innerText = "Total: ₹0";
    return;
  }

  cart.forEach((item,i)=>{
    total += item.price * item.quantity;

    cartBox.innerHTML += `
      <div class="cart-item">
        <img src="${item.image}">
        <div class="cart-info">
          <h4>${item.name}</h4>
          <div class="price">₹${item.price}</div>
        </div>

        <div class="qty-box">
          <button onclick="changeQty(${i},-1)">−</button>
          <span>${item.quantity}</span>
          <button onclick="changeQty(${i},1)">+</button>
        </div>

        <button class="remove" onclick="removeItem(${i})">✕</button>
      </div>
    `;
  });

  totalEl.innerText = "Total: ₹" + total;
}

function changeQty(i,val){
  cart[i].quantity += val;
  if(cart[i].quantity < 1) cart[i].quantity = 1;
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

function removeItem(i){
  cart.splice(i,1);
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

function checkout(){
  if(cart.length === 0){
    alert("Cart empty");
    return;
  }
  window.location.href="/static/customer/checkout.html";
}

renderCart();

if (user && user.name) {
  nav.innerHTML = `
    <span style="color:white;margin-right:15px;">
      👋 Hi, <b>${user.name}</b>
    </span>
    <a href="/static/customer/products.html">Products</a>
    <a href="/static/customer/videos.html">Videos</a>
    <a href="/static/customer/testimonials.html">Testimonials</a>
    <a href="/static/customer/cart.html">Cart</a>
    <a href="#" onclick="logout()">Logout</a>
  `;
}

function logout() {
  localStorage.removeItem("user");
  alert("Logged out successfully");
  window.location.href = "/static/customer/login.html";
}

</script>

</body>
</html>
