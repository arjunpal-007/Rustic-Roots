<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/static/customer/style.css">

<style>

/* ===== BODY ===== */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  min-height: 100vh;
  background:
    linear-gradient(rgba(255,255,255,.85), rgba(255,255,255,.85)),
    url("/static/assets/bg.jpeg");
  background-size: cover;
  background-position: center;
  display: flex;
  flex-direction: column;
  overflow-x: hidden; /* ✅ FIX */
}

/* ===== NAVBAR ===== */
.navbar {
  height: 70px;
  background: #2e7d32;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  flex-wrap: wrap;
}

.nav-right {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
}

.nav-right a {
  color: white;
  text-decoration: none;
  margin-left: 22px;
  font-weight: 500;
}

/* ===== CENTER CONTAINER ===== */
.container {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

/* ===== LOGIN CARD ===== */
.card {
  width: 100%;
  max-width: 420px;
  background: white;
  padding: 40px 30px;
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,.12);
  text-align: center;
  animation: fadeUp .6s ease;
}

.card h2 {
  margin-bottom: 25px;
  font-size: 26px;
  color: #2e7d32;
}

/* ===== INPUTS ===== */
.card input {
  width: 100%;
  padding: 14px;
  margin-bottom: 16px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 14px;
  transition: .3s;
  box-sizing: border-box;
}

.card input:focus {
  outline: none;
  border-color: #2e7d32;
  box-shadow: 0 0 0 3px rgba(46,125,50,.15);
}

/* ===== BUTTON ===== */
.card button {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg,#2f7a3e,#4caf50);
  color: white;
  border: none;
  font-size: 16px;
  font-weight: 600;
  border-radius: 30px;
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(47,122,62,.35);
  transition: .3s;
}

.card button:hover {
  transform: translateY(-2px);
}

/* ===== TEXT ===== */
#msg {
  margin-top: 10px;
  font-weight: 500;
}

.card p {
  margin-top: 18px;
  font-size: 14px;
}

.card a {
  color: #2e7d32;
  font-weight: 600;
  text-decoration: none;
}

/* ===== ANIMATION ===== */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ================= RESPONSIVE ================= */

@media (max-width: 768px) {

  .navbar {
    height: auto;
    padding: 15px;
    flex-direction: column;
    align-items: center;
  }

  .nav-right {
    margin-top: 10px;
    justify-content: center;
  }

  .nav-right a {
    margin: 8px 10px;
    font-size: 14px;
  }

  .container {
    padding: 15px;
  }

  .card {
    padding: 30px 20px;
    border-radius: 16px;
  }

  .card h2 {
    font-size: 22px;
  }

}

@media (max-width: 480px) {

  .card {
    padding: 25px 15px;
  }

  .card input {
    padding: 12px;
    font-size: 13px;
  }

  .card button {
    padding: 12px;
    font-size: 14px;
  }

  .nav-right a {
    font-size: 13px;
  }

}

</style>
</head>

<body>

<!-- 🔝 NAVBAR -->
<nav class="navbar">
  <div></div>
  <div class="nav-right" id="navLinks"></div>
</nav>

<!-- 🔐 LOGIN CARD -->
<div class="container">
    <div class="card">
        <h2>Login</h2>
        <input id="email" placeholder="Email">
        <input id="password" type="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <p id="msg"></p>
        <p>New user? <a href="signup.html">Signup</a></p>
    </div>
</div>

<!-- 🔑 AUTH SCRIPT -->
<script src="/static/customer/auth.js"></script>

<!-- ✅ NAVBAR LOGIN / LOGOUT LOGIC -->
<script>
const nav = document.getElementById("navLinks");
const user = JSON.parse(localStorage.getItem("user"));

if (user && user.name) {
  nav.innerHTML = `
    <span style="color:white; margin-right:15px;">
      👋 Hi, <b>${user.name}</b>
    </span>
    <a href="/static/customer/products.html">Products</a>
    <a href="/static/customer/cart.html">Cart</a>
    <a href="#" onclick="logout()">Logout</a>
  `;
} else {
  nav.innerHTML = `
    <a href="/static/customer/products.html">Products</a>
    <a href="/static/customer/cart.html">Cart</a>
    <a href="/static/customer/login.html">Login</a>
  `;
}

function logout() {
  localStorage.removeItem("user");
  alert("Logged out successfully");
  window.location.href = "/static/customer/login.html";
}
</script>

</body>
</html>
