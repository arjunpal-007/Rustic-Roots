<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details</title>
<link rel="stylesheet" href="/static/customer/style.css">

<style>
/* SAME CSS AS YOURS — untouched */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background-image:
    linear-gradient(rgba(255,255,255,.49), rgba(255,255,255,.25)),
    url("/static/assets/bg.jpeg");
  background-size: cover;
  background-attachment: fixed;
  min-height: 100vh;
}

.navbar{
  height:70px;
  background:#2e7d32;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 40px;
  flex-wrap:wrap; /* ✅ added */
}

.nav-left img{ height:45px; }

.nav-right{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
}

.nav-right a{
  color:white;
  text-decoration:none;
  margin-left:25px;
  font-weight:500;
  position: relative;
  transition: all 0.3s ease;
}

.nav-right a::after {
  content: '';
  position: absolute;
  bottom: -5px;
  left: 0;
  width: 0;
  height: 2px;
  background: #a5d6a7;
  transition: width 0.3s ease;
}

.nav-right a:hover::after {
  width: 100%;
}

.wrapper{
  max-width:1100px;
  margin:50px auto;
  background:white;
  border-radius:22px;
  padding:40px;
  display:flex;
  gap:50px;
  box-shadow:0 20px 40px rgba(0,0,0,.12);
}

.left img{
  width:380px;
  border-radius:18px;
}

.price{
  font-size:26px;
  font-weight:bold;
  color:#2e7d32;
}

.qty-box{
  display:flex;
  align-items:center;
  gap:16px;
  margin:20px 0;
}

.qty-box button{
  width:38px;
  height:38px;
  border-radius:50%;
  border:none;
  background:#2e7d32;
  color:white;
  font-size:20px;
  cursor:pointer;
}

.cart-btn{
  background:#2e7d32;
  color:white;
  border:none;
  padding:14px 40px;
  border-radius:30px;
  font-size:16px;
  cursor:pointer;
}

/* REVIEWS */
.reviews-section {
  max-width: 1000px;
  margin: 50px auto;
  padding: 30px;
  background: rgba(255,255,255,0.9);
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.1);
}

.review-card {
  background: white;
  padding: 15px 20px;
  border-radius: 12px;
  margin-bottom: 15px;
  box-shadow: 0 8px 18px rgba(0,0,0,0.08);
}

.review-form {
  margin-top: 30px;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.review-form input,
.review-form select,
.review-form textarea {
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

.review-form textarea {
  height: 100px;
}

.review-form button {
  background: #2e7d32;
  color: white;
  border: none;
  padding: 12px;
  border-radius: 25px;
  font-weight: 600;
  cursor: pointer;
}

/* ================= RESPONSIVE ADDITION ================= */

@media (max-width: 900px){

  .wrapper{
    flex-direction:column;
    padding:25px;
    gap:30px;
  }

  .left{
    text-align:center;
  }

  .left img{
    width:100%;
    max-width:420px;
  }

}

@media (max-width: 768px){

  .navbar{
    height:auto;
    padding:15px;
    flex-direction:column;
  }

  .nav-right{
    margin-top:10px;
    justify-content:center;
  }

  .nav-right a{
    margin:8px 12px;
  }

  .wrapper{
    margin:30px 15px;
  }

  .reviews-section{
    margin:30px 15px;
    padding:20px;
  }

}

</style>
</head>

<body>

<nav class="navbar">
  <div class="nav-left">
    <a href="/static/customer/index.html">
      <img src="/static/customer/logo.png">
    </a>
  </div>

  <div class="nav-right" id="navLinks">
    <a href="/static/customer/products.html">Products</a>
    <a href="/static/customer/videos.html">Videos</a>
    <a href="/static/customer/testimonials.html">Testimonials</a>
    <a href="/static/customer/login.html">Login</a>
  </div>
</nav>

<div class="wrapper">
  <div class="left">
    <img id="pimg">
  </div>

  <div class="right">
    <h2 id="pname"></h2>
    <div class="price" id="pprice"></div>
    <p id="pdesc"></p>

    <div class="qty-box">
      <button onclick="changeQty(-1)">−</button>
      <span id="qty">1</span>
      <button onclick="changeQty(1)">+</button>
    </div>

    <button class="cart-btn" onclick="addToCart()">Add to Cart</button>
  </div>
</div>

<!-- REVIEWS SECTION -->
<div class="reviews-section">
  <h2>⭐ Customer Reviews</h2>

  <div id="reviewsList"></div>

  <div class="review-form">
    <h3>Add Review</h3>

    <input type="text" id="reviewName" placeholder="Your Name">

    <select id="reviewRating">
      <option value="5">⭐⭐⭐⭐⭐</option>
      <option value="4">⭐⭐⭐⭐</option>
      <option value="3">⭐⭐⭐</option>
      <option value="2">⭐⭐</option>
      <option value="1">⭐</option>
    </select>

    <textarea id="reviewComment" placeholder="Write your review"></textarea>

    <button type="button" onclick="submitReview()">Submit Review</button>
  </div>
</div>

<!-- ⚠️ YOUR ORIGINAL SCRIPT REMAINS EXACTLY SAME BELOW -->

<script>
const nav = document.getElementById("navLinks");
const user = JSON.parse(localStorage.getItem("user"));
const params = new URLSearchParams(window.location.search);
const productId = params.get("id");
const API = "/products";
let qty = 1;

fetch(API)
.then(r => r.json())
.then(list => {
  const p = list.find(x => x.id == productId);
  if(!p) return;

  pimg.src = "/static/uploads/" + p.image;
  pname.innerText = p.name;
  pprice.innerText = "₹" + p.price;
  pdesc.innerText = p.description || "";
});

function changeQty(v){
  qty = Math.max(1, qty + v);
  document.getElementById("qty").innerText = qty;
}

function addToCart(){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  const product = {
    id: productId,
    name: pname.innerText,
    price: Number(pprice.innerText.replace("₹","")),
    image: pimg.src,
    quantity: qty
  };

  cart.push(product);
  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Added to cart 🛒");
}

function loadReviews() {
  fetch("/reviews/" + productId)
    .then(res => res.json())
    .then(data => {

      const box = document.getElementById("reviewsList");
      box.innerHTML = "";

      if (data.length === 0) {
        box.innerHTML = "<p>No reviews yet.</p>";
        return;
      }

      data.forEach(r => {
        box.innerHTML += `
          <div class="review-card">
            <strong>${r.name}</strong><br>
            <span style="color:gold;">
              ${"★".repeat(r.rating)}
              ${"☆".repeat(5 - r.rating)}
            </span>
            <p>${r.comment}</p>
          </div>
        `;
      });
    });
}

function submitReview() {
  const name = reviewName.value;
  const rating = reviewRating.value;
  const comment = reviewComment.value;

  if (!name || !comment) {
    alert("Please fill all fields");
    return;
  }

  fetch("/add-review", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      product_id: productId,
      name,
      rating,
      comment
    })
  })
  .then(res => res.json())
  .then(data => {
    if (data.message) {
      alert("Review submitted successfully!");
      reviewComment.value = "";
      loadReviews();
    }
  });
}

if (productId) loadReviews();

if (user && user.name) {
  nav.innerHTML = `
    <span style="color:white;margin-right:15px;">
      👋 Hi, <b>${user.name}</b>
    </span>
    <a href="/static/customer/products.html">Products</a>
    <a href="/static/customer/videos.html">Videos</a>
    <a href="/static/customer/testimonials.html">Testimonials</a>
    <a href="#" onclick="logout()">Logout</a>
  `;
}

function logout() {
  localStorage.removeItem("user");
  alert("Logged out successfully");
  window.location.href = "/static/customer/login.html";
}

</script>

</body>
</html>
