<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testimonials - Rustic Roots</title>
  <link rel="stylesheet" href="/static/customer/style.css">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #e8f1ed 100%);
      min-height: 100vh;
    }

    /* NAVBAR */
    .navbar {
      height: 75px;
      background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 50px;
      flex-wrap: wrap;
      box-shadow: 0 8px 25px rgba(46, 125, 50, 0.25);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-left img {
      height: 50px;
      transition: transform 0.3s ease;
    }

    .nav-left img:hover {
      transform: scale(1.05);
    }

    .nav-right {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 30px;
    }

    .nav-right a {
      color: white;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      transition: all 0.3s ease;
      position: relative;
    }

    .nav-right a:hover {
      color: #a5d6a7;
    }

    .nav-right a::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 0;
      width: 0;
      height: 2px;
      background: #a5d6a7;
      transition: width 0.3s ease;
    }

    .nav-right a:hover::after {
      width: 100%;
    }

    /* PAGE HEADER */
    .page-header {
      text-align: center;
      padding: 60px 20px 40px;
      background: linear-gradient(135deg, rgba(46, 125, 50, 0.1) 0%, rgba(165, 214, 167, 0.1) 100%);
      border-bottom: 3px solid #2e7d32;
    }

    .page-title {
      font-size: 42px;
      margin: 0;
      color: #1b5e20;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .page-subtitle {
      font-size: 16px;
      color: #558b2f;
      margin-top: 10px;
      font-weight: 400;
    }

    /* CONTAINER */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 50px 20px;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 35px;
    }

    /* TESTIMONIAL CARD */
    .testimonial-card {
      background: white;
      border-radius: 20px;
      padding: 35px;
      position: relative;
      box-shadow: 0 10px 40px rgba(46, 125, 50, 0.12);
      transition: all 0.4s cubic-bezier(0.23, 1, 0.320, 1);
      overflow: hidden;
    }

    .testimonial-card::before {
      content: '"';
      position: absolute;
      top: -10px;
      left: 15px;
      font-size: 80px;
      color: rgba(46, 125, 50, 0.1);
      line-height: 1;
    }

    .testimonial-card:hover {
      transform: translateY(-12px);
      box-shadow: 0 20px 60px rgba(46, 125, 50, 0.25);
    }

    .rating {
      font-size: 20px;
      color: #ffc107;
      margin-bottom: 15px;
      letter-spacing: 2px;
    }

    .comment {
      font-style: italic;
      color: #555;
      margin-bottom: 20px;
      line-height: 1.8;
      font-size: 15px;
    }

    .name {
      font-weight: 700;
      color: #1b5e20;
      font-size: 16px;
      margin-bottom: 5px;
    }

    .designation {
      font-size: 13px;
      color: #999;
    }

    /* FOOTER */
    .footer {
      text-align: center;
      padding: 40px 20px;
      background: #1b5e20;
      color: white;
      margin-top: 60px;
      font-size: 14px;
    }

    /* ================== MOBILE RESPONSIVE ================== */
    @media (max-width: 768px) {
      .navbar {
        height: auto;
        padding: 15px 20px;
        flex-direction: column;
      }

      .nav-left {
        margin-bottom: 15px;
      }

      .nav-right {
        width: 100%;
        justify-content: center;
        gap: 15px;
      }

      .nav-right a {
        font-size: 13px;
        margin: 5px 10px;
      }

      .page-header {
        padding: 40px 20px;
      }

      .page-title {
        font-size: 28px;
      }

      .page-subtitle {
        font-size: 14px;
      }

      .grid {
        grid-template-columns: 1fr;
        gap: 25px;
      }

      .container {
        padding: 30px 15px;
      }

      .testimonial-card {
        padding: 25px;
      }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-left">
    <a href="/static/customer/index.html" class="logo-link">
      <img src="/static/customer/logo.png">
    </a>
  </div>

  <div class="nav-right" id="navLinks">
    <a href="/static/customer/login.html">Login</a>
  </div>
</nav>

<div class="page-header"><h1 class="page-title">?? Customer Testimonials</h1><p class="page-subtitle">Read what our happy customers have to say</p></div><div class="container"><div id="testimonials" class="grid"></div></div><div class="footer">� 2026 Rustic Roots | Natural Skincare</div><script>
const nav = document.getElementById("navLinks");
const user = JSON.parse(localStorage.getItem("user"));

// Sample testimonials (in a real app, fetch from backend)
const testimonials = [
  {
    name: "Priya Sharma",
    comment: "Absolutely love the natural ingredients! My skin feels so refreshed and healthy. Highly recommend Rustic Roots products.",
    rating: 5
  },
  {
    name: "Rahul Kumar",
    comment: "Great quality products at reasonable prices. The customer service is excellent too. Will definitely buy again!",
    rating: 5
  },
  {
    name: "Anjali Patel",
    comment: "These products have transformed my skincare routine. Natural, effective, and affordable. Five stars!",
    rating: 5
  },
  {
    name: "Vikram Singh",
    comment: "Been using their soaps for months now. My skin has never looked better. Thank you Rustic Roots!",
    rating: 4
  },
  {
    name: "Meera Joshi",
    comment: "Love the rustic packaging and the natural scent. Feels premium and eco-friendly. Great job!",
    rating: 5
  },
  {
    name: "Arjun Reddy",
    comment: "Fast delivery and excellent product quality. The reviews were spot on. Very satisfied customer.",
    rating: 5
  }
];

const box = document.getElementById("testimonials");
testimonials.forEach(t => {
  box.innerHTML += `
    <div class="testimonial-card">
      <div class="rating">${"★".repeat(t.rating)}${"☆".repeat(5 - t.rating)}</div>
      <p class="comment">${t.comment}</p>
      <div class="name">${t.name}</div>
      <div class="designation">Verified Customer</div>
    </div>
  `;
});

if (user && user.name) {
  nav.innerHTML = `
    <span style="color:white;margin-right:15px;">
      👋 Hi, <b>${user.name}</b>
    </span>
    <a href="#" onclick="logout()">Logout</a>
  `;
}

function logout() {
  localStorage.removeItem("user");
  alert("Logged out successfully");
  window.location.href = "/static/customer/login.html";
}
</script>

</body>
</html>
