<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Videos - Rustic Roots</title>
  <link rel="stylesheet" href="/static/customer/style.css">
  <style>
    body { margin:0; font-family:'Segoe UI',sans-serif; background-image:url('https://rusticroots.store/wp-content/uploads/2026/02/Rustic-Roots-Home-Banner-Image.png'); background-size:cover; background-position:center top; background-attachment:fixed; background-color:#f4faf2; background-blend-mode:soft-light; color:#1b5e24; min-height:100vh; }
    .header { background:rgba(255,255,255,0.96); border-bottom:1px solid rgba(0,0,0,0.08); position:sticky; top:0; z-index:1000; box-shadow:0 6px 18px rgba(0,0,0,0.06); }
    .header-content { max-width:1200px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; padding:18px 24px; gap:20px; }
    .logo { height:54px; }
    .nav-menu { display:flex; gap:28px; align-items:center; flex-wrap:wrap; }
    .nav-menu a { color:#1b5e24; text-decoration:none; font-weight:600; transition:color .25s; }
    .nav-menu a:hover { color:#2e7d32; }
    .page-header { max-width:1200px; margin:0 auto; padding:72px 24px 24px; text-align:center; }
    .page-title { font-size:48px; margin-bottom:16px; color:#1b5e20; letter-spacing:-0.5px; }
    .page-subtitle { max-width:700px; margin:0 auto; color:#4f6b4f; font-size:18px; line-height:1.75; }
    .container { max-width:1200px; margin:0 auto; padding:40px 24px 80px; display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:28px; }
    .video-card { background:#fff; border-radius:24px; box-shadow:0 18px 40px rgba(46,125,50,0.12); overflow:hidden; transition:transform .3s; }
    .video-card:hover { transform:translateY(-6px); }
    .video-card video { width:100%; display:block; height:220px; object-fit:cover; background:#000; }
    .video-card-body { padding:26px; }
    .video-card h3 { margin:0 0 14px; font-size:22px; color:#1b5e20; }
    .video-card p { margin:0 0 20px; color:#556a53; line-height:1.7; }
    .watch-link { display:inline-flex; align-items:center; justify-content:center; padding:12px 22px; border-radius:999px; background:#2e7d32; color:#fff; text-decoration:none; font-weight:700; transition:background .25s; }
    .watch-link:hover { background:#1b5e20; }
    @media (max-width:720px) { .page-title { font-size:36px; } .header-content { flex-direction:column; align-items:flex-start; } }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-content">
      <a href="/" class="logo-link"><img src="/static/customer/logo.png" alt="Rustic Roots" class="logo"></a>
      <nav class="nav-menu">
        <a href="/">Home</a>
        <a href="/videos">Videos</a>
        <a href="/testimonials-page">Testimonials</a>
        <a href="/reviews">Reviews</a>
      </nav>
    </div>
  </header>
  <section class="page-header">
    <h1 class="page-title">🎥 Videos</h1>
  <main class="container" id="videos"></main>
  <script>
    const videos = [];
    function renderVideos() {
      const box = document.getElementById('videos');
      box.innerHTML = '';
      videos.forEach(v => {
        box.innerHTML += `\n          <article class="video-card">\n            <video controls preload="metadata" poster="/static/assets/bg.jpeg">\n              <source src="${v.file_path}" type="video/mp4">\n              Your browser does not support video.\n            </video>\n            <div class="video-card-body">\n              <h3>${v.title}</h3>\n              <p>${v.description}</p>\n              <a class="watch-link" href="${v.file_path}" target="_blank">Open Video</a>\n            </div>\n          </article>\n        `;
      });
    }
    fetch('/api/videos').then(r=>r.json()).then(data=>{videos.push(...data);renderVideos();});
  </script>
  <footer style="background:transparent; color:#5c3f1d; text-align:center; padding:18px 0; margin-top:40px; font-size:0.95rem; letter-spacing:0.02em;">
    <p style="margin:0;">&copy; 2026 Rustic Roots Copyright All Right Reserved | Designed & Developed By V B Global Services</p>
  </footer>
</body>
</html>
