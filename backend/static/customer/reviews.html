<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reviews - Rustic Roots</title>
  <link rel="stylesheet" href="/static/customer/style.css">
  <style>
    body { margin:0; font-family:'Segoe UI',sans-serif; background-image:url('https://rusticroots.store/wp-content/uploads/2026/02/Rustic-Roots-Home-Banner-Image.png'); background-size:cover; background-position:center top; background-attachment:fixed; background-color:#f4faf2; background-blend-mode:soft-light; color:#1b5e24; min-height:100vh; }
    .header { background:rgba(255,255,255,0.96); border-bottom:1px solid rgba(0,0,0,0.08); position:sticky; top:0; z-index:1000; box-shadow:0 6px 18px rgba(0,0,0,0.06); }
    .header-content { max-width:1200px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; padding:18px 24px; gap:20px; }
    .logo { height:54px; }
    .nav-menu { display:flex; gap:28px; align-items:center; flex-wrap:wrap; }
    .nav-menu a { color:#1b5e24; text-decoration:none; font-weight:600; transition:color .25s; }
    .nav-menu a:hover { color:#2e7d32; }
    .page-header { max-width:1200px; margin:0 auto; padding:72px 24px 24px; text-align:center; }
    .page-title { font-size:48px; margin-bottom:16px; color:#1b5e20; letter-spacing:-0.5px; }
    .page-subtitle { max-width:700px; margin:0 auto; color:#4f6b4f; font-size:18px; line-height:1.75; }
    .container { max-width:1200px; margin:0 auto; padding:40px 24px 80px; display:grid; grid-template-columns:1.4fr 1fr; gap:28px; }
    .reviews-list, .review-form { background:#fff; border-radius:24px; padding:28px; box-shadow:0 18px 40px rgba(46,125,50,0.12); }
    .review-card { border-bottom:1px solid #e6f0e8; padding-bottom:24px; margin-bottom:24px; }
    .review-card:last-child { border-bottom:none; margin-bottom:0; padding-bottom:0; }
    .review-card .rating { color:#f0b90b; font-size:18px; margin-bottom:10px; }
    .review-card .name { font-weight:700; color:#1b5e20; margin-bottom:8px; }
    .review-card p { color:#4f6b4f; line-height:1.7; }
    .review-form input, .review-form textarea, .review-form select { width:100%; padding:16px 18px; margin-bottom:18px; border:1px solid #d7e4dc; border-radius:14px; font-size:15px; color:#1b3f25; }
    .review-form button { width:100%; padding:15px; border:none; border-radius:999px; background:#2e7d32; color:#fff; font-size:16px; font-weight:700; cursor:pointer; }
    .review-form button:hover { background:#1b5e20; }
    @media (max-width:980px) { .container { grid-template-columns:1fr; } }
    @media (max-width:720px) { .page-title { font-size:36px; } .header-content { flex-direction:column; align-items:flex-start; } }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-content">
      <a href="/" class="logo-link"><img src="/static/customer/logo.png" alt="Rustic Roots" class="logo"></a>
      <nav class="nav-menu">
        <a href="/">Home</a>
        <a href="/videos">Videos</a>
        <a href="/testimonials-page">Testimonials</a>
        <a href="/reviews">Reviews</a>
      </nav>
    </div>
  </header>
  <section class="page-header">
    <h1 class="page-title">💬 Reviews</h1>
  </section>
  <main class="container">
    <section class="reviews-list"><h2 style="color:#1b5e20;margin-top:0;">Recent Reviews</h2><div id="reviewsContainer"></div></section>
    <section class="review-form"><h2 style="color:#1b5e20;margin-top:0;">Leave a Review</h2><input id="reviewerName" type="text" placeholder="Your Name"><select id="reviewerRating"><option value="5">⭐⭐⭐⭐⭐</option><option value="4">⭐⭐⭐⭐</option><option value="3">⭐⭐⭐</option><option value="2">⭐⭐</option><option value="1">⭐</option></select><textarea id="reviewerComment" rows="6" placeholder="Write your review..."></textarea><button type="button" onclick="submitReview()">Submit Review</button><p id="reviewStatus" style="margin-top:14px;color:#2e7d32;"></p></section>
  </main>
  <script>
    function renderReviews(testimonials){const c=document.getElementById('reviewsContainer');c.innerHTML='';testimonials.forEach(t=>{c.innerHTML+=`<div class="review-card"><div class="rating">${'★'.repeat(t.rating)}${'☆'.repeat(5-t.rating)}</div><div class="name">${t.name}</div><p>${t.comment}</p></div>`;});}
    function loadReviews(){fetch('/api/testimonials').then(r=>r.json()).then(data=>renderReviews(data));}
    function submitReview(){const name=document.getElementById('reviewerName').value.trim();const rating=document.getElementById('reviewerRating').value;const comment=document.getElementById('reviewerComment').value.trim();const status=document.getElementById('reviewStatus');if(!name||!comment){status.style.color='#c0392b';status.innerText='Please fill in your name and comment.';return;}fetch('/add-testimonial',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,rating,comment})}).then(res=>res.json()).then(data=>{if(data.message){status.style.color='#2e7d32';status.innerText='Review submitted successfully!';document.getElementById('reviewerName').value='';document.getElementById('reviewerComment').value='';loadReviews();}else{status.style.color='#c0392b';status.innerText=data.error||'Something went wrong.';}});}loadReviews();
  </script>
  <footer style="background:transparent; color:#5c3f1d; text-align:center; padding:18px 0; margin-top:40px; font-size:0.95rem; letter-spacing:0.02em;">
    <p style="margin:0;">&copy; 2026 Rustic Roots Copyright All Right Reserved | Designed & Developed By V B Global Services</p>
  </footer>
</body>
</html>
